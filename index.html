<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>關鍵時刻評量 · Toastmasters</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --burgundy: #8B1A2F;
    --gold: #C8973A;
    --gold-light: #E8C47A;
    --cream: #FAF6EE;
    --dark: #1A1208;
    --mid: #5A4A30;
    --border: #E0D4BB;
    --surface: #FFF9F0;
    --green: #2D6A4F;
    --orange: #C45E1A;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(26,18,8,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', 'Noto Serif TC', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ─── HEADER ─────────────────────────────────── */
  .app-header {
    background: linear-gradient(135deg, var(--burgundy) 0%, #5A0E1F 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .app-header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-badge {
    display: inline-block;
    background: rgba(200,151,58,0.25);
    border: 1px solid rgba(200,151,58,0.5);
    color: var(--gold-light);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .app-header h1 {
    font-family: 'Noto Serif TC', serif;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
  }
  .app-header p {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-top: 6px;
  }

  /* ─── PROGRESS BAR ────────────────────────────── */
  .progress-wrap {
    background: #fff;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--mid);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--burgundy), var(--gold));
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ─── SCREENS ─────────────────────────────────── */
  .screen { display: none; animation: fadeUp 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ─── WELCOME ─────────────────────────────────── */
  #screen-welcome {
    padding: 32px 20px 40px;
    max-width: 480px;
    margin: 0 auto;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--burgundy), #C0392B);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px;
    box-shadow: 0 8px 24px rgba(139,26,47,0.3);
  }
  #screen-welcome h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 24px;
    text-align: center;
    color: var(--dark);
    margin-bottom: 12px;
  }
  #screen-welcome p {
    text-align: center;
    color: var(--mid);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .input-group { margin-bottom: 20px; }
  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    font-family: inherit;
    background: #fff;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--burgundy); }

  /* ─── BUTTONS ──────────────────────────────────── */
  .btn-primary {
    display: block; width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--burgundy) 0%, #A0202E 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(139,26,47,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(139,26,47,0.2); }

  .btn-gold {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--gold) 0%, #A87628 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(200,151,58,0.35);
    transition: transform 0.15s;
  }
  .btn-gold:active { transform: scale(0.97); }

  .btn-outline {
    display: block; width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--burgundy);
    border: 2px solid var(--burgundy);
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 12px;
  }
  .btn-outline:active { background: rgba(139,26,47,0.06); }

  /* ─── CATEGORY CARD ────────────────────────────── */
  .category-header {
    background: var(--burgundy);
    padding: 20px 20px 16px;
    position: relative;
  }
  .cat-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 4px;
  }
  .cat-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    color: #fff;
    font-weight: 700;
  }
  .cat-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }

  .criteria-list {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 540px;
    margin: 0 auto;
  }

  /* ─── CRITERION ROW ────────────────────────────── */
  .criterion {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .criterion-label {
    padding: 14px 16px 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--dark);
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }
  .score-row {
    display: flex;
    padding: 10px 12px 4px;
    gap: 6px;
  }
  .score-btn {
    flex: 1;
    min-width: 0;
    height: 44px;
    border: 2px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .score-btn:active { transform: scale(0.93); }
  .score-btn.s1.selected { background: #FDE8E8; border-color: #C0392B; color: #C0392B; }
  .score-btn.s2.selected { background: #FDECD8; border-color: #E67E22; color: #E67E22; }
  .score-btn.s3.selected { background: #FFF5D4; border-color: #D4AC0D; color: #A38A00; }
  .score-btn.s4.selected { background: #D9F0E4; border-color: #27AE60; color: #1E8449; }
  .score-btn.s5.selected { background: #C8E6C9; border-color: #1B5E20; color: #1B5E20; }

  .score-legend {
    display: flex;
    justify-content: space-between;
    padding: 4px 12px 10px;
    font-size: 10px;
    color: #aaa;
    font-weight: 500;
  }

  .criterion.unanswered {
    border-color: #C0392B;
    box-shadow: 0 0 0 2px rgba(192,57,43,0.15);
  }
  .criterion.unanswered .criterion-label {
    color: var(--burgundy);
  }
  .required-banner {
    background: #FDE8E8; color: #C0392B;
    font-size: 13px; font-weight: 600;
    padding: 10px 16px; border-radius: 10px;
    margin: 0 20px 12px;
    max-width: 500px; margin-left: auto; margin-right: auto;
    display: none; text-align: center;
  }
  .required-banner.visible { display: block; }

  /* ─── NAV BUTTONS ──────────────────────────────── */
  .nav-row {
    display: flex;
    gap: 12px;
    padding: 16px 20px 32px;
    max-width: 540px;
    margin: 0 auto;
  }
  .btn-nav {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-prev {
    background: #fff;
    border: 2px solid var(--border);
    color: var(--mid);
  }
  .btn-next {
    background: linear-gradient(135deg, var(--burgundy), #A0202E);
    color: #fff;
    box-shadow: 0 4px 14px rgba(139,26,47,0.25);
  }
  .btn-nav:active { transform: scale(0.97); }

  /* ─── RESULTS ──────────────────────────────────── */
  #screen-result { padding: 0 0 60px; }

  .result-header {
    background: linear-gradient(135deg, var(--dark) 0%, #3A2510 100%);
    padding: 28px 20px 24px;
    text-align: center;
  }
  .result-header .club-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    color: var(--gold-light);
    margin-bottom: 4px;
  }
  .result-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }
  .result-header .timestamp {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
  }

  .total-score-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    margin: 16px 20px;
    padding: 18px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }
  .total-ring {
    width: 72px; height: 72px;
    flex-shrink: 0;
    border-radius: 50%;
    background: conic-gradient(var(--burgundy) var(--pct, 0%), var(--border) 0%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .total-ring::after {
    content: '';
    position: absolute;
    width: 54px; height: 54px;
    background: #fff;
    border-radius: 50%;
  }
  .total-ring span {
    position: relative; z-index: 1;
    font-size: 17px; font-weight: 700;
    color: var(--burgundy);
  }
  .total-text h3 {
    font-size: 16px; font-weight: 700;
    color: var(--dark);
  }
  .total-text p {
    font-size: 12px; color: var(--mid);
    margin-top: 3px; line-height: 1.5;
  }

  /* Category result rows */
  .cat-results {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 540px;
    margin: 0 auto;
  }
  .cat-result-row {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cat-result-top {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }
  .cat-emoji { font-size: 22px; }
  .cat-result-name {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .cat-score-badge {
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .badge-high { background: #D9F0E4; color: #1E8449; }
  .badge-mid  { background: #FFF5D4; color: #9A7D0A; }
  .badge-low  { background: #FDE8E8; color: #C0392B; }
  .cat-bar-wrap {
    padding: 0 16px 14px;
  }
  .cat-bar-bg {
    height: 8px; background: var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.6s ease;
  }
  .bar-high { background: linear-gradient(90deg, #27AE60, #1E8449); }
  .bar-mid  { background: linear-gradient(90deg, #F1C40F, #D4AC0D); }
  .bar-low  { background: linear-gradient(90deg, #E74C3C, #C0392B); }

  /* ─── STRATEGY TABLE ────────────────────────────── */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--dark);
    padding: 20px 20px 10px;
    max-width: 540px;
    margin: 0 auto;
    display: block;
  }

  .strategy-card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin: 0 20px 10px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }
  .strategy-head {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
  }
  .strategy-head .tag-alert {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px;
    background: #FDE8E8; color: #C0392B;
  }
  .strategy-head .tag-warn {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px;
    background: #FEF0DC; color: #C45E1A;
  }
  .strategy-head .tag-ok {
    background: #D9F0E4; color: #1E8449;
  }
  .strategy-head h4 {
    font-size: 14px; font-weight: 600; color: var(--dark);
  }
  .strategy-body { padding: 14px 16px; }
  .strategy-item {
    display: flex; gap: 10px;
    margin-bottom: 10px;
    font-size: 13px; line-height: 1.6; color: var(--mid);
  }
  .strategy-item:last-child { margin-bottom: 0; }
  .strategy-dot {
    width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    flex-shrink: 0; margin-top: 7px;
  }

  /* Strengths */
  .strength-card {
    background: linear-gradient(135deg, #F0FBF4, #E0F4E8);
    border-radius: var(--radius);
    border: 1px solid #A3D9B4;
    padding: 16px;
    margin: 0 20px 10px;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }
  .strength-card h4 {
    font-size: 13px; font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .strength-item {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 8px;
    font-size: 13px; line-height: 1.6; color: #1E5F3F;
  }
  .strength-item:last-child { margin-bottom: 0; }
  .strength-check { color: var(--green); font-size: 14px; flex-shrink: 0; }

  /* ─── DISCUSSION BOXES ────────────────────── */
  .disc-box {
    background: #fff;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 0 20px 12px;
    max-width: 500px;
    margin-left: auto; margin-right: auto;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }
  .disc-box.required-alert { border-color: #C0392B; }
  .disc-q-label {
    display: flex; gap: 8px; align-items: flex-start;
    flex-wrap: wrap;
    margin-bottom: 14px;
    font-size: 14px; font-weight: 600; color: var(--dark);
    line-height: 1.5;
  }
  .disc-q-num {
    background: var(--burgundy); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 8px;
    flex-shrink: 0; letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .disc-required-tag {
    font-size: 10px; font-weight: 700; color: #C0392B;
    background: #FDE8E8; padding: 2px 8px; border-radius: 10px;
    flex-shrink: 0; align-self: center;
  }
  .disc-hint {
    font-size: 12px; color: var(--mid);
    background: #FFF9EE; border-left: 3px solid var(--gold);
    padding: 8px 10px; border-radius: 6px;
    margin-bottom: 14px; line-height: 1.6;
  }

  /* Bubble chips */
  .bubble-wrap {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
  }
  .bubble {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    background: var(--surface);
    font-size: 12px; font-weight: 500;
    color: var(--mid);
    cursor: pointer; font-family: inherit;
    line-height: 1.4; text-align: left;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bubble:active { transform: scale(0.96); }
  .bubble.selected {
    background: #FDE8E8; border-color: var(--burgundy);
    color: var(--burgundy); font-weight: 600;
  }
  .selected-count {
    font-size: 12px; color: var(--mid);
    margin-top: 8px;
    display: none;
    align-items: center; gap: 6px;
  }
  .selected-count.visible { display: flex; }
  .sc-badge {
    background: var(--burgundy); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 20px;
  }
  .required-msg {
    font-size: 12px; color: #C0392B; font-weight: 600;
    margin-top: 8px; display: none;
  }
  .required-msg.visible { display: block; }

  /* Action rows */
  .action-row {
    display: grid;
    grid-template-columns: 0.9fr 2fr 0.7fr 28px;
    gap: 6px;
    margin-bottom: 8px;
    align-items: start;
  }
  .action-row textarea {
    width: 100%; padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px; font-family: inherit;
    color: var(--dark); background: #fff;
    outline: none; resize: none;
    min-height: 60px; line-height: 1.5;
    transition: border-color 0.2s;
    overflow: hidden;
    box-sizing: border-box;
    display: block;
  }
  .action-row textarea:focus { border-color: var(--burgundy); }
  .action-row-labels {
    display: grid;
    grid-template-columns: 0.9fr 2fr 0.7fr 28px;
    gap: 6px; margin-bottom: 4px;
  }
  .action-row-labels span {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--mid);
    padding-left: 10px; /* aligns with textarea padding */
    display: block;
  }
  .action-row-labels .lbl-spacer { /* placeholder for delete col */ }
  .del-row-btn {
    background: none; border: none;
    color: #ccc; font-size: 20px; cursor: pointer;
    padding: 0; width: 28px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0; line-height: 1;
    padding-top: 18px; /* vertically centre in row */
  }
  .del-row-btn:active { color: #C0392B; }
  .add-row-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    font-size: 13px; font-weight: 600;
    color: var(--mid); font-family: inherit;
    cursor: pointer; width: 100%; justify-content: center;
    margin-top: 4px;
    transition: border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .add-row-btn:active { border-color: var(--gold); color: var(--gold); }

  /* ─── BEST PRACTICE ACCORDION ─────────────── */
  .bp-section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;

/* ════════════════════════════════════════

function buildScreens() {
  const container = document.getElementById('screens-container');
  container.innerHTML = '';
  CATEGORIES.forEach((cat, i) => {
    const screenDiv = document.createElement('div');
    screenDiv.className = 'screen';
    screenDiv.id = `screen-cat-${i}`;

    let criteriaHTML = cat.criteria.map((crit, ci) => `
      <div class="criterion" id="crit-${cat.id}-${ci}">
        <div class="criterion-label">${crit}</div>
        <div class="score-row">
          ${[1,2,3,4,5].map(n => `
            <button class="score-btn s${n}" onclick="setScore('${cat.id}',${ci},${n},this)">${n}</button>
          `).join('')}
        </div>
        <div class="score-legend">
          <span>從未符合</span><span>總是符合</span>
        </div>
      </div>
    `).join('');

    screenDiv.innerHTML = `
      <div class="category-header">
        <div class="cat-number">第 ${i+1} 類 / 共 ${CATEGORIES.length} 類</div>
        <div class="cat-title">${cat.emoji} ${cat.title}</div>
        <div class="cat-desc">${cat.desc}</div>
      </div>
      <div id="req-banner-${i}" class="required-banner">⚠ 請為所有項目評分後再繼續</div>
      <div class="criteria-list">${criteriaHTML}</div>
      <div class="nav-row">
        <button class="btn-nav btn-prev" onclick="navigate(${i})">← 上一步</button>
        <button class="btn-nav btn-next" id="next-btn-${i}" onclick="tryNavigate(${i}, ${i+2})">
          ${i === CATEGORIES.length-1 ? '查看結果 →' : '下一類 →'}
        </button>
      </div>
    `;
    container.appendChild(screenDiv);
  });
}

/* ════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function startAssessment() {
  const inp = document.getElementById('club-name-input').value.trim();
  if (!inp) {
    document.getElementById('club-name-input').focus();
    showToast('請先輸入分會名稱 😊');
    return;
  }
  clubName = inp;
  // Init scores
  CATEGORIES.forEach(cat => {
    scores[cat.id] = new Array(cat.criteria.length).fill(null);
  });
  buildScreens();
  showScreen('screen-cat-0');
  document.getElementById('progress-wrap').style.display = 'block';
  updateProgress(1);
}

function tryNavigate(catScreenIdx, target) {
  // catScreenIdx is the 0-based category index currently shown
  const cat = CATEGORIES[catScreenIdx];
  if (!cat) { navigate(target); return; }

  const catScores = scores[cat.id];
  const unscored = catScores.map((v, i) => i).filter(i => catScores[i] === null);

  if (unscored.length > 0) {
    // Highlight unanswered items
    unscored.forEach(i => {
      const el = document.getElementById(`crit-${cat.id}-${i}`);
      if (el) el.classList.add('unanswered');
    });
    const banner = document.getElementById(`req-banner-${catScreenIdx}`);
    if (banner) {
      banner.classList.add('visible');
      banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    showToast(`還有 ${unscored.length} 題尚未評分`);
    return;
  }
  navigate(target);
}

function navigate(target) {
  // target: 0=welcome, 1-6=cat index, 7=result
  if (target === 0) {
    showScreen('screen-welcome');
    document.getElementById('progress-wrap').style.display = 'none';
    return;
  }
  if (target === CATEGORIES.length + 1) {
    // Going to results
    buildResults();
    showScreen('screen-result');
    updateProgress(CATEGORIES.length + 1);
    window.scrollTo(0,0);
    return;
  }
  showScreen(`screen-cat-${target-1}`);
  updateProgress(target);
  window.scrollTo(0,0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateProgress(catNum) {
  const pct = Math.round(((catNum - 1) / CATEGORIES.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    catNum > CATEGORIES.length ? '評量完成' : `第 ${catNum} 類 / 共 ${CATEGORIES.length} 類`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

/* ════════════════════════════════════════
   SCORING
═══════════════════════════════════════════ */
function setScore(catId, critIndex, value, btn) {
  scores[catId][critIndex] = value;
  const row = btn.closest('.score-row');
  row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  // Clear unanswered highlight on this criterion
  const critEl = document.getElementById(`crit-${catId}-${critIndex}`);
  if (critEl) critEl.classList.remove('unanswered');
  // If all answered, hide the banner
  const cat = CATEGORIES.find(c => c.id === catId);
  if (cat) {
    const catIdx = CATEGORIES.indexOf(cat);
    const allAnswered = scores[catId].every(v => v !== null);
    if (allAnswered) {
      const banner = document.getElementById(`req-banner-${catIdx}`);
      if (banner) banner.classList.remove('visible');
    }
  }
}

function getCatAvg(catId) {
  const arr = scores[catId].filter(v => v !== null);
  if (!arr.length) return 0;
  return arr.reduce((a,b) => a+b, 0) / arr.length;
}

function getTotalAvg() {
  let all = [];
  CATEGORIES.forEach(cat => {
    scores[cat.id].filter(v => v !== null).forEach(v => all.push(v));
  });
  if (!all.length) return 0;
  return all.reduce((a,b) => a+b, 0) / all.length;
}

function scoreLabel(avg) {
  if (avg >= 4)   return { text: '優秀', cls: 'badge-high', bar: 'bar-high' };
  if (avg >= 2.5) return { text: '待加強', cls: 'badge-mid',  bar: 'bar-mid'  };
  return               { text: '需關注', cls: 'badge-low',  bar: 'bar-low'  };
}

function getStrengthsData() {
  // Returns array of { label, score, desc, isCategory }
  const strongCatsFull = [...CATEGORIES]
    .map(c => ({ ...c, avg: getCatAvg(c.id) }))
    .filter(c => c.avg >= 4)
    .sort((a, b) => b.avg - a.avg)
    .slice(0, 3);

  if (strongCatsFull.length > 0) {
    return { type: 'category', title: '✦ 分會優勢項目', items: strongCatsFull.map(cat => {
      const catStrs = CRITERION_STRENGTHS[cat.id] || [];
      const bestIdx = scores[cat.id].reduce((bi, sc, i) =>
        (sc !== null && (bi === -1 || sc > scores[cat.id][bi])) ? i : bi, -1);
      const desc = bestIdx >= 0 && catStrs[bestIdx] ? catStrs[bestIdx] : `整體表現均衡優秀（均分 ${cat.avg.toFixed(1)}）`;
      return { label: `${cat.emoji} ${cat.title}`, score: cat.avg.toFixed(1), desc };
    })};
  }

  // Fallback: top 3 individual criteria ≥ 4
  let allCriteria = [];
  CATEGORIES.forEach(cat => {
    const catStrs = CRITERION_STRENGTHS[cat.id] || [];
    scores[cat.id].forEach((sc, i) => {
      if (sc !== null && sc >= 4) {
        allCriteria.push({ label: `${cat.emoji} ${cat.criteria[i]}`, score: sc, desc: catStrs[i] || '', sub: cat.title });
      }
    });
  });
  allCriteria.sort((a, b) => b.score - a.score);
  const top3 = allCriteria.slice(0, 3);
  if (top3.length > 0) {
    return { type: 'criterion', title: '✦ 分會相對優勢（單項）', items: top3.map(x => ({
      label: x.label, score: x.score, desc: x.desc, sub: x.sub
    }))};
  }
  return null;
}

function getOverallComment(avg) {
  if (avg >= 4.5) return '分會各面向均表現卓越，繼續保持領導力！';

  return '建議立即召開幹部會議，制定 90 天改善計畫。';
}

function toggleBP(uid) {
  const item = document.getElementById(uid);
  if (item) item.classList.toggle('open');
}

// ── Discussion Q1: bubble selection ──────────────
let selectedBubbles = new Set();

function toggleBubble(idx) {
  const btn = document.getElementById(`bubble-${idx}`);
  if (!btn) return;
  if (selectedBubbles.has(idx)) {
    selectedBubbles.delete(idx);
    btn.classList.remove('selected');
  } else {
    selectedBubbles.add(idx);
    btn.classList.add('selected');
  }
  const countEl = document.getElementById('selected-count');
  const numEl   = document.getElementById('sel-num');
  const reqMsg  = document.getElementById('required-msg');
  const q1box   = document.getElementById('disc-q1');
  if (numEl)   numEl.textContent = selectedBubbles.size;
  if (countEl) countEl.classList.toggle('visible', selectedBubbles.size > 0);
  if (reqMsg)  reqMsg.classList.toggle('visible', false);
  if (q1box)   q1box.classList.toggle('required-alert', false);
  syncActionRows();
}

// ── Discussion Q2: action rows ───────────────────
let actionRowCount = 0;

function syncActionRows() {
  const target = Math.max(1, selectedBubbles.size);
  while (actionRowCount < target) addActionRow(false);
}

function addActionRow(manual = true) {
  actionRowCount++;
  const id = `arow-${actionRowCount}`;
  const wrap = document.getElementById('action-rows');
  if (!wrap) return;

  // Labels row (only once, above all rows)
  if (!document.getElementById('action-row-labels')) {
    const labelsDiv = document.createElement('div');
    labelsDiv.className = 'action-row-labels';
    labelsDiv.id = 'action-row-labels';
    labelsDiv.innerHTML = `
      <span>Who</span>
      <span>Will do what</span>
      <span>By when</span>
      <span class="lbl-spacer"></span>
    `;
    wrap.before(labelsDiv);
  }

  const row = document.createElement('div');
  row.className = 'action-row';
  row.id = id;
  row.innerHTML = `
    <textarea placeholder="負責人" oninput="autoResize(this)"></textarea>
    <textarea placeholder="行動內容（可參考下方最佳策略表）" oninput="autoResize(this)"></textarea>
    <textarea placeholder="期限" oninput="autoResize(this)"></textarea>
  `;
  const delBtn = document.createElement('button');
  delBtn.className = 'del-row-btn';
  delBtn.textContent = '×';
  delBtn.title = '刪除';
  delBtn.onclick = () => removeActionRow(id);
  row.appendChild(delBtn);
  wrap.appendChild(row);
}

function removeActionRow(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  actionRowCount = document.querySelectorAll('.action-row').length;
  // Remove labels if no rows left
  if (actionRowCount === 0) {
    const lbl = document.getElementById('action-row-labels');
    if (lbl) lbl.remove();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function restartAssessment() {
  scores = {};
  clubName = '';
  document.getElementById('club-name-input').value = '';
  showScreen('screen-welcome');
  document.getElementById('progress-wrap').style.display = 'none';
}

/* ════════════════════════════════════════
   DOWNLOAD AS IMAGE
═══════════════════════════════════════════ */
async function downloadResult() {
  const btn = document.querySelector('.btn-gold');
  btn.innerHTML = `<span class="loading-spinner"></span> 生成中...`;
  btn.disabled = true;

  const now = new Date().toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  const total = getTotalAvg();

  // ── Score rows ────────────────────────────────────
  const catRows = CATEGORIES.map(cat => {
    const avg = getCatAvg(cat.id);
    const pctBar = avg ? Math.round((avg/5)*100) : 0;
    const lbl = scoreLabel(avg);
    const color = lbl.cls === 'badge-high' ? '#27AE60' : lbl.cls === 'badge-mid' ? '#D4AC0D' : '#C0392B';
    return `
      <div class="cc-row">
        <span class="cc-row-icon">${cat.emoji}</span>
        <div style="flex:1">
          <div class="cc-row-name">${cat.title}</div>
          <div class="cc-bar-bg"><div class="cc-bar-fill" style="width:${pctBar}%;background:${color}"></div></div>
        </div>
        <span class="cc-row-score" style="color:${color}">${avg ? avg.toFixed(1) : 'N/A'}</span>
      </div>`;
  }).join('');

  // ── Q1 label + selected bubbles ───────────────────
  const allChallengesList = BEST_PRACTICES.flatMap(group =>
    group.entries.map(entry => ({ catLabel: group.catLabel, challenge: entry.challenge }))
  );
  const bubblesContent = selectedBubbles.size > 0
    ? [...selectedBubbles].map(idx => {
        const c = allChallengesList[idx];
        return `<div style="display:inline-block;background:#FDE8E8;border:1px solid #C0392B;
          border-radius:20px;font-size:11px;color:#8B1A2F;font-weight:600;
          padding:4px 10px;margin:3px 4px 3px 0;line-height:1.4;">
          ${c ? c.catLabel + '：' + c.challenge : ''}
        </div>`;
      }).join('')
    : `<div style="font-size:12px;color:#aaa;">（未選取）</div>`;

  // ── Q2 label + action rows ────────────────────────
  const actionRowEls = document.querySelectorAll('.action-row');
  const actionRowsData = [...actionRowEls].map(row => {
    const areas = row.querySelectorAll('textarea');
    return { who: areas[0]?.value || '', what: areas[1]?.value || '', when: areas[2]?.value || '' };
  });

  const actionTable = actionRowsData.length > 0 ? `
    <div style="display:grid;grid-template-columns:1fr 1.5fr 0.8fr;gap:3px;margin-bottom:5px;padding:0 2px;">
      <div style="font-size:9px;font-weight:700;color:#888;text-transform:uppercase;padding-left:2px;">Who</div>
      <div style="font-size:9px;font-weight:700;color:#888;text-transform:uppercase;">Will do what</div>
      <div style="font-size:9px;font-weight:700;color:#888;text-transform:uppercase;">By when</div>
    </div>
    ${actionRowsData.map(r => `
      <div style="display:grid;grid-template-columns:1fr 1.5fr 0.8fr;gap:3px;margin-bottom:5px;
        background:#FFFBF5;border:1px solid #E0D4BB;border-radius:8px;padding:8px 10px;">
        <div style="font-size:12px;color:#1A1208;line-height:1.5;word-break:break-word;">${r.who || '—'}</div>
        <div style="font-size:12px;color:#1A1208;line-height:1.5;word-break:break-word;">${r.what || '—'}</div>
        <div style="font-size:12px;color:#1A1208;line-height:1.5;word-break:break-word;">${r.when || '—'}</div>
      </div>`).join('')}
  ` : `<div style="font-size:12px;color:#aaa;">（未填寫）</div>`;

  // ── Strengths block for capture card ─────────────
  const strengthsData = getStrengthsData();
  const strengthsCardHTML = strengthsData ? `
    <div style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="background:#1E8449;color:#fff;font-size:10px;font-weight:700;
          padding:3px 9px;border-radius:8px;letter-spacing:0.5px;">💪 優勢</span>
        <span style="font-size:12px;font-weight:600;color:#1A1208;">${strengthsData.title.replace('✦ ','')}</span>
      </div>
      ${strengthsData.items.map(x => `
        <div style="display:flex;gap:10px;align-items:flex-start;
          background:#F2FBF5;border:1px solid #B8E0C4;border-radius:8px;
          padding:9px 12px;margin-bottom:6px;">
          <span style="color:#1E8449;font-size:14px;flex-shrink:0;margin-top:1px;">✓</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:#1A1208;">
              ${x.label}
              <span style="font-size:11px;font-weight:700;color:#1E8449;background:#C8E6C9;
                padding:2px 7px;border-radius:10px;margin-left:5px;">${x.score} 分</span>
            </div>
            ${x.sub ? `<div style="font-size:11px;color:#888;margin-top:1px;">${x.sub}</div>` : ''}
            <div style="font-size:12px;color:#1E5F3F;margin-top:4px;line-height:1.6;">${x.desc}</div>
          </div>
        </div>`).join('')}
    </div>` : '';

  // ── Capture card HTML — Q labels sit directly above answers ──
  document.getElementById('capture-card').innerHTML = `
    <div class="cc-header">
      <div class="badge-sm">Moments of Truth · 關鍵時刻評量</div>
      <div class="cc-club">${clubName}</div>
      <div class="cc-sub">${now}</div>
    </div>
    <div class="cc-body">
      <div class="cc-total">
        <span class="cc-total-label">整體平均分數</span>
        <span class="cc-total-val">${total.toFixed(1)} / 5</span>
      </div>
      ${catRows}
      ${strengthsCardHTML}

      <!-- Q1 -->
      <div style="margin-top:14px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="background:#8B1A2F;color:#fff;font-size:10px;font-weight:700;
            padding:3px 9px;border-radius:8px;letter-spacing:0.5px;">Q1</span>
          <span style="font-size:12px;font-weight:600;color:#1A1208;">遇到挑戰的原因為何？</span>
        </div>
        ${bubblesContent}
      </div>

      <!-- Q2 -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span style="background:#8B1A2F;color:#fff;font-size:10px;font-weight:700;
            padding:3px 9px;border-radius:8px;letter-spacing:0.5px;">Q2</span>
          <span style="font-size:12px;font-weight:600;color:#1A1208;">該如何因應？誰應擔負起行動的責任？</span>
        </div>
        ${actionTable}
      </div>

      <div class="cc-footer">Toastmasters International · The Successful Club Series</div>
    </div>
  `;

  const card = document.getElementById('capture-card');
  card.style.left = '-9999px';
  card.style.top = '0';

  await new Promise(r => setTimeout(r, 300));

  try {
    const canvas = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#FAF6EE',
      width: 390,
      logging: false,
    });

    const filename = `${clubName}_關鍵時刻評量_${now.replace(/[/:\s]/g,'')}.png`;

    // ── Mobile: use Web Share API → saves directly to Photos ──
    if (navigator.share && navigator.canShare) {
      canvas.toBlob(async (blob) => {
        const file = new File([blob], filename, { type: 'image/png' });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file], title: `${clubName} 關鍵時刻評量` });
            showToast('✓ 已分享／儲存！');
          } catch (e) {
            if (e.name !== 'AbortError') fallbackDownload(canvas, filename);
          }
        } else {
          fallbackDownload(canvas, filename);
        }
        btn.innerHTML = `<span>⬇</span> 下載評量結果圖片`;
        btn.disabled = false;
      }, 'image/png');
      return; // wait for blob callback
    }

    // ── Desktop fallback ──
    fallbackDownload(canvas, filename);
    showToast('✓ 圖片已下載！');
  } catch(e) {
    showToast('下載失敗，請截圖儲存');
  }

  btn.innerHTML = `<span>⬇</span> 下載評量結果圖片`;
  btn.disabled = false;
}

function fallbackDownload(canvas, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

/* ════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
